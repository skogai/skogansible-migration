---
# Example Playbook: Composition Pattern
# This playbook demonstrates how to compose primitives into a complex workflow
#
# Run with: ansible-playbook primitives/examples/composition_example.yml

- name: Primitives Composition Example
  hosts: localhost
  connection: local
  become: false

  tasks:
    - name: "Example: Complete AUR setup using composition"
      include_tasks: ../compose/aur_setup.yml
      tags:
        - example
        - composition
        - aur

    - name: "Verify AUR setup completed successfully"
      include_tasks: ../query_state/path_exists.yml
      vars:
        path_to_check: /usr/bin/yay
        path_register_var: yay_verify
      tags:
        - example
        - composition
        - aur

    - name: Display AUR setup result
      debug:
        msg: "AUR helper (yay) is {{ 'installed' if yay_verify.stat.exists else 'not installed' }}"
      tags:
        - example
        - composition
        - aur
