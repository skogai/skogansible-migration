---
# Primitive: ensure_template
#
# Deploy a Jinja2 template to a destination with validation
#
# Required variables:
#   template_src: Source template file (relative to templates/)
#   template_dest: Destination path for rendered template
#
# Optional variables:
#   template_owner: File owner (default: current user)
#   template_group: File group (default: current user's primary group)
#   template_mode: File permissions (default: '0644')
#   template_backup: Create backup before overwrite (default: false)
#   template_validate: Validation command (use %s for temp file path)
#   template_become: Run with elevated privileges (default: false)
#   template_notify: Handler to notify on change (optional)
#
# Example usage:
#   - include_tasks: primitives/ensure_content/ensure_template.yml
#     vars:
#       template_src: sshd_config.j2
#       template_dest: /etc/ssh/sshd_config
#       template_mode: '0600'
#       template_validate: 'sshd -t -f %s'
#       template_become: true
#       template_notify: restart sshd

- name: "Primitive | Deploy template {{ template_src }} to {{ template_dest }}"
  ansible.builtin.template:
    src: "{{ template_src }}"
    dest: "{{ template_dest }}"
    owner: "{{ template_owner | default(omit) }}"
    group: "{{ template_group | default(omit) }}"
    mode: "{{ template_mode | default('0644') }}"
    backup: "{{ template_backup | default(false) }}"
    validate: "{{ template_validate | default(omit) }}"
  become: "{{ template_become | default(false) }}"
  notify: "{{ template_notify | default(omit) }}"
  register: template_result

- name: "Primitive | Template deployment result"
  ansible.builtin.debug:
    msg: "Template {{ template_src }} deployed to {{ template_dest }} - Changed: {{ template_result.changed }}"
    verbosity: 1
