---
# Primitive: ensure_config
#
# Copy a configuration file to destination with validation
#
# Required variables:
#   config_src: Source configuration file (relative to files/)
#   config_dest: Destination path for configuration file
#
# Optional variables:
#   config_owner: File owner (default: current user)
#   config_group: File group (default: current user's primary group)
#   config_mode: File permissions (default: '0644')
#   config_backup: Create backup before overwrite (default: false)
#   config_validate: Validation command (use %s for temp file path)
#   config_become: Run with elevated privileges (default: false)
#   config_notify: Handler to notify on change (optional)
#   config_force: Force overwrite even if destination exists (default: true)
#
# Example usage:
#   - include_tasks: primitives/ensure_content/ensure_config.yml
#     vars:
#       config_src: pacman.conf
#       config_dest: /etc/pacman.conf
#       config_mode: '0644'
#       config_validate: 'pacman-conf -c %s'
#       config_become: true
#       config_notify: update pacman cache

- name: "Primitive | Copy config {{ config_src }} to {{ config_dest }}"
  ansible.builtin.copy:
    src: "{{ config_src }}"
    dest: "{{ config_dest }}"
    owner: "{{ config_owner | default(omit) }}"
    group: "{{ config_group | default(omit) }}"
    mode: "{{ config_mode | default('0644') }}"
    backup: "{{ config_backup | default(false) }}"
    validate: "{{ config_validate | default(omit) }}"
    force: "{{ config_force | default(true) }}"
  become: "{{ config_become | default(false) }}"
  notify: "{{ config_notify | default(omit) }}"
  register: config_result

- name: "Primitive | Config deployment result"
  ansible.builtin.debug:
    msg: "Config {{ config_src }} deployed to {{ config_dest }} - Changed: {{ config_result.changed }}"
    verbosity: 1
