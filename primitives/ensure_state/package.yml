---
# Primitive: ensure_state/package
# Purpose: Ensure packages exist with specific state (present/absent/latest)
# Usage: include_tasks with package_name, package_state variables
#
# Required variables:
#   package_name: string or list - Package name(s)
#   package_state: present|absent|latest - Desired state (default: present)
#
# Example:
#   - include_tasks: primitives/ensure_state/package.yml
#     vars:
#       package_name: git
#       package_state: present

- name: "Ensure package {{ package_name }} is {{ package_state | default('present') }}"
  become: true
  community.general.pacman:
    name: "{{ package_name }}"
    state: "{{ package_state | default('present') }}"
  tags:
    - packages
    - primitive
    - ensure_state
