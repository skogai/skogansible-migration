---
# Primitive: ensure_service
# Purpose: Service state management (started/stopped/enabled/disabled)
# Category: ensure_state
#
# Usage:
#   - include_tasks: primitives/ensure_state/service.yml
#     vars:
#       service_name: service_name
#       service_state: started  # started, stopped, restarted, reloaded
#       service_enabled: true  # true, false, optional
#       service_daemon_reload: false  # optional, reload systemd daemon first
#
# Examples:
#   # Start and enable service
#   - include_tasks: primitives/ensure_state/service.yml
#     vars:
#       service_name: sshd
#       service_state: started
#       service_enabled: true
#
#   # Stop and disable service
#   - include_tasks: primitives/ensure_state/service.yml
#     vars:
#       service_name: bluetooth
#       service_state: stopped
#       service_enabled: false
#
#   # Restart service after config change
#   - include_tasks: primitives/ensure_state/service.yml
#     vars:
#       service_name: nginx
#       service_state: restarted
#       service_daemon_reload: true

- name: "Primitive | Reload systemd daemon"
  become: true
  ansible.builtin.systemd:
    daemon_reload: true
  when:
    - service_daemon_reload | default(false)

- name: "Primitive | Ensure service {{ service_name }} is {{ service_enabled | default(true) | ternary('enabled', 'disabled') }} and {{ service_state | default('started') }}"
  become: true
  ansible.builtin.systemd:
    name: "{{ service_name }}"
    state: "{{ service_state | default('started') }}"
    enabled: "{{ service_enabled | default(omit) }}"
  when: service_name is defined
