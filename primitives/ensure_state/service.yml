---
# Primitive: ensure_state/service
# Purpose: Ensure systemd service is in desired state
# Usage: include_tasks with service_* variables
#
# Required variables:
#   service_name: string - Service name (e.g., "sshd.service")
#
# Optional variables:
#   service_enabled: bool - Enable on boot (default: true)
#   service_state: started|stopped|restarted|reloaded - Runtime state (default: started)
#   service_daemon_reload: bool - Reload systemd daemon (default: false)
#
# Example:
#   - include_tasks: primitives/ensure_state/service.yml
#     vars:
#       service_name: sshd.service
#       service_enabled: true
#       service_state: started

- name: Reload systemd daemon
  become: true
  ansible.builtin.systemd:
    daemon_reload: true
  when: service_daemon_reload | default(false)
  tags:
    - services
    - primitive
    - ensure_state

- name: "Ensure service {{ service_name }} is {{ service_state | default('started') }} and {{ 'enabled' if service_enabled | default(true) else 'disabled' }}"
  become: true
  ansible.builtin.systemd:
    name: "{{ service_name }}"
    enabled: "{{ service_enabled | default(true) }}"
    state: "{{ service_state | default('started') }}"
  tags:
    - services
    - primitive
    - ensure_state
