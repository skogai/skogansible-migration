---
# Composition: compose/aur_setup
# Purpose: High-level composition showing how to use primitives together
# This is an example of composing multiple primitives to achieve a complex task
#
# This composition sets up AUR package building infrastructure by:
# 1. Creating aur_builder user
# 2. Configuring sudoers for pacman access
# 3. Installing base-devel and git
# 4. Cloning yay repository
# 5. Building and installing yay
# 6. Cleaning up build directory
#
# Usage:
#   - include_tasks: primitives/compose/aur_setup.yml

# Step 1: Create aur_builder user
- include_tasks: ../ensure_state/user.yml
  vars:
    user_name: aur_builder
    user_group: wheel
    user_shell: /bin/bash
    user_comment: "AUR package builder"
    user_create_home: true

# Step 2: Configure sudoers
- include_tasks: ../ensure_content/line_in_file.yml
  vars:
    line_path: /etc/sudoers.d/11-install-aur_builder
    line_content: 'aur_builder ALL=(ALL) NOPASSWD: /usr/bin/pacman'
    line_create: true
    line_mode: "0644"
    line_validate: 'visudo -cf %s'
    line_become: true

# Step 3: Ensure base-devel and git are installed
- include_tasks: ../ensure_state/package.yml
  vars:
    package_name:
      - base-devel
      - git
    package_state: present

# Step 4: Check if yay already exists
- include_tasks: ../query_state/path_exists.yml
  vars:
    path_to_check: /usr/bin/yay
    path_register_var: yay_stat

# Step 5: Clone yay repository (if not exists)
- include_tasks: ../sync/git_repo.yml
  vars:
    git_repo: https://aur.archlinux.org/yay.git
    git_dest: /home/aur_builder/yay
    git_version: master
    git_update: true
    git_become: true
    git_become_user: aur_builder
  when: not yay_stat.stat.exists

# Step 6: Build and install yay (if not exists)
- include_tasks: ../execute/command.yml
  vars:
    command_cmd: makepkg -si --noconfirm --noprogressbar
    command_chdir: /home/aur_builder/yay
    command_creates: /usr/bin/yay
    command_become: true
    command_become_user: aur_builder
  when: not yay_stat.stat.exists

# Step 7: Clean up build directory (if we just built yay)
- name: Clean up yay build directory
  become: true
  ansible.builtin.file:
    path: /home/aur_builder/yay
    state: absent
  when: not yay_stat.stat.exists
  tags:
    - aur
    - compose
