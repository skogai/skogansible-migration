---
# Default playbook - full workstation configuration (all roles)
# Variables are auto-loaded from group_vars/all/
- name: Configure Arch Linux workstation
  hosts: all
  connection: local

  roles:
    - role: users
      tags: [users, security]

    - role: packages
      tags: [packages, install]

    - role: ssh
      tags: [ssh, config]

    - role: git
      tags: [git, vcs]

    - role: chezmoi
      tags: [chezmoi, dotfiles]

    - role: zsh
      tags: [zsh, shell]

    - role: cloudflared
      tags: [cloudflared, tunnel, services]

    - role: filesystems
      tags: [filesystems, mounts]
