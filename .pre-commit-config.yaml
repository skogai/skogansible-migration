---
# Pre-commit hooks configuration for skogansible
# Install pre-commit: pip install pre-commit
# Install hooks: pre-commit install
# Run manually: pre-commit run --all-files
#
# Documentation: https://pre-commit.com/

repos:
  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^\.env$
      - id: end-of-file-fixer
        exclude: ^\.env$
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [--strict]
        exclude: ^\.github/|^\.direnv/|^\.cache/|^\.collections/|^logs/

  # Ansible linting
  - repo: https://github.com/ansible/ansible-lint
    rev: v24.9.2
    hooks:
      - id: ansible-lint
        files: \.(yaml|yml)$
        exclude: ^\.github/|^\.direnv/|^\.cache/|^\.collections/|^logs/

  # Ansible syntax checking (using local hook)
  - repo: local
    hooks:
      - id: ansible-syntax-check
        name: Ansible Syntax Check
        description: Validate Ansible playbook syntax
        entry: bash -c 'ansible-playbook playbooks/all.yml --syntax-check 2>&1 | grep -v "^\[WARNING\].*Error loading plugin\|^\[WARNING\].*Unable to load the cache plugin" || true'
        language: system
        pass_filenames: false
        files: ^(playbooks|roles|vars)/.*\.(yml|yaml)$
        require_serial: true

# Global configuration
default_language_version:
  python: python3

# Fail fast on first error
fail_fast: false

# Minimum pre-commit version
minimum_pre_commit_version: '2.20.0'
