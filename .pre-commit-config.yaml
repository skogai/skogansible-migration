# Pre-commit hooks for chezmoi dotfiles repository
# Install: pip install pre-commit
# Setup: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.tmpl$ # Allow trailing whitespace in templates
      - id: end-of-file-fixer
        # - id: check-yaml
        args: ["--unsafe"] # Allow custom YAML tags in chezmoi configs
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: mixed-line-ending

  # Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: ["--severity=warning"]
        exclude: ^(dot_zshrc|dot_zshenv|dot_profile|.*\.zsh|\.envrc)$ # Skip zsh-specific files and .envrc

  # Python code formatting and linting
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3

  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args: ["--max-line-length=100", "--extend-ignore=E203,W503"]

  # YAML linting
  # - repo: https://github.com/adrienverge/yamllint
  #   rev: v1.35.1
  #   hooks:
  #     - id: yamllint
  #       args:
  #         - "-d"
  #         - >-
  #           {extends: default,
  #           rules: {line-length: {max: 180},
  #           document-start: disable, truthy: {check-keys: false}}}

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.42.0
    hooks:
      - id: markdownlint
        args: ["--fix"]
        exclude: ^\.claude/skills/.*/references/.*\.md$ # Skip reference docs

  # TypeScript/JavaScript linting (for Claude hooks)
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.15.0
    hooks:
      - id: eslint
        files: \.[jt]sx?$ # *.js, *.jsx, *.ts, *.tsx
        types: [file]
        additional_dependencies:
          - eslint@9.15.0
          - "@typescript-eslint/parser@8.14.0"
          - "@typescript-eslint/eslint-plugin@8.14.0"
        args: ["--fix"]

  # Detect secrets and credentials
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: >
          (?x)^(
            package(-lock)?\.json|
            .*example.*\.yml|
            roles/ssh/README\.md|
            \.claude/skills/.*/references/.*\.md
          )$

  # Verify Ansible Vault files are encrypted with AES256
  - repo: local
    hooks:
      - id: check-vault-encryption
        name: Ensure vault files are encrypted with AES256
        entry: .pre-commit-scripts/check-vault-encryption.sh
        language: system
        pass_filenames: false
        always_run: true

  # Chezmoi template validation
  - repo: local
    hooks:
      - id: chezmoi-validate
        name: Validate chezmoi templates
        entry: >-
          bash -c 'if command -v chezmoi >/dev/null 2>&1;
          then chezmoi execute-template --init --promptString email=test@example.com
          < /dev/null > /dev/null 2>&1 || exit 0; fi'
        language: system
        pass_filenames: false
        files: \.tmpl$

  # # Check for common issues
