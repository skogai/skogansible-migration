---
# Pre-commit hooks configuration for skogansible
# Install pre-commit: pip install pre-commit
# Install hooks: pre-commit install
# Run manually: pre-commit run --all-files
#
# Documentation: https://pre-commit.com/

repos:
  # Local hooks using system-installed tools (faster and more reliable)
  - repo: local
    hooks:
      # yamllint - YAML file linting
      - id: yamllint
        name: YAML Lint
        description: Check YAML files for syntax and style issues
        entry: yamllint
        args: [--strict]
        language: system
        types: [yaml]
        require_serial: false

      # ansible-lint - Ansible best practices and syntax checking
      - id: ansible-lint
        name: Ansible Lint
        description: Check Ansible playbooks and roles for best practices
        entry: ansible-lint
        language: system
        files: \.(yaml|yml)$
        exclude: ^\.github/|^\.direnv/|^\.cache/|^\.collections/|^logs/
        require_serial: true

      # ansible-playbook syntax check
      - id: ansible-syntax-check
        name: Ansible Syntax Check
        description: Validate Ansible playbook syntax
        entry: >-
          bash -c 'ansible-playbook playbooks/all.yml --syntax-check 2>&1 |
          grep -v "^\[WARNING\].*Error loading plugin\|^\[WARNING\].*Unable to load the cache plugin" || true'
        language: system
        pass_filenames: false
        files: ^(playbooks|roles|vars)/.*\.(yml|yaml)$
        require_serial: true

      # trailing-whitespace check
      - id: trailing-whitespace
        name: Trim Trailing Whitespace
        entry: bash -c 'for file in "$@"; do sed -i "s/[[:space:]]*$//" "$file"; done' --
        language: system
        types: [text]
        exclude: ^\.env$

      # end-of-file-fixer
      - id: end-of-file-fixer
        name: Fix End of Files
        entry: >-
          bash -c 'for file in "$@"; do if [ -s "$file" ] && [ -z "$(tail -c 1 "$file")" ];
          then :; else echo >> "$file"; fi; done' --
        language: system
        types: [text]
        exclude: ^\.env$

      # check-merge-conflict
      - id: check-merge-conflict
        name: Check for Merge Conflicts
        entry: >-
          bash -c 'for file in "$@"; do if grep -q "^<<<<<<< " "$file";
          then echo "Merge conflict markers found in $file"; exit 1; fi; done' --
        language: system
        types: [text]

      # mixed-line-ending
      - id: mixed-line-ending
        name: Fix Mixed Line Endings
        entry: bash -c 'for file in "$@"; do dos2unix "$file" 2>/dev/null || sed -i "s/\r$//" "$file"; done' --
        language: system
        types: [text]

# Global configuration
default_language_version:
  python: python3

# Fail fast on first error
fail_fast: false

# Minimum pre-commit version
minimum_pre_commit_version: '2.20.0'
