# Worktrunk Project Configuration
# Location: .config/wt.toml (in repository root)
# This file is automatically loaded for project-specific hooks and settings

# Post-create hook: Run after creating a new worktree
[[hooks.post-create]]
run = "direnv allow"
description = "Allow direnv for new worktree"

# Post-start hook: Run after switching to this worktree
[[hooks.post-start]]
run = "echo '📂 Ansible worktree ready - run ./run.sh --check to verify'"
description = "Show helpful reminder"

# Pre-commit hook: Run before committing
# Validates ansible syntax before allowing commits
[[hooks.pre-commit]]
run = "ansible-playbook playbook.yml --syntax-check"
description = "Validate Ansible syntax"
continue-on-error = true  # Don't block commits on syntax errors (just warn)

# Pre-merge hook: Run before merging back to main branch
# Full validation before merging
[[hooks.pre-merge]]
run = "./run.sh --check"
description = "Dry-run playbook before merge"

# Post-merge hook: Run after successful merge
[[hooks.post-merge]]
run = "echo '✅ Merged successfully - worktree will be cleaned up'"
description = "Confirm merge success"
