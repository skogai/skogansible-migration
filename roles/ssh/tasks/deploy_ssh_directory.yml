---
# Deploy entire .ssh directory from backup
# Use this to restore a complete .ssh folder setup

- name: "SSH | Deploy entire .ssh directory from files"
  when: ssh_deploy_full_directory | bool
  tags: [ssh, ssh-deploy-directory]
  block:
    - name: "SSH | Ensure .ssh directory exists"
      ansible.builtin.file:
        path: "{{ ansible_facts['env']['HOME'] }}/.ssh"
        state: directory
        mode: "0700"
        owner: "{{ ansible_facts['user_id'] }}"
        group: "{{ ansible_facts['user_id'] }}"

    - name: "SSH | Sync .ssh directory from files/"
      ansible.builtin.copy:
        src: "files/ssh/"
        dest: "{{ ansible_facts['env']['HOME'] }}/.ssh/"
        mode: preserve
        owner: "{{ ansible_facts['user_id'] }}"
        group: "{{ ansible_facts['user_id'] }}"
      no_log: true  # Don't log file contents

    - name: "SSH | Ensure correct permissions on private keys"
      ansible.builtin.shell: |
        find {{ ansible_facts['env']['HOME'] }}/.ssh -type f -name 'id_*' ! -name '*.pub' -exec chmod 600 {} \;
        find {{ ansible_facts['env']['HOME'] }}/.ssh -type f -name '*.pub' -exec chmod 644 {} \;
      changed_when: false
