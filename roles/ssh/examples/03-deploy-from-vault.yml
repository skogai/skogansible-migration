---
# Example 3: Deploy SSH Keys from Ansible Vault
# Most common use case - deploy pre-existing keys from encrypted vault

- name: Deploy SSH keys from vault
  hosts: localhost
  connection: local

  # Load vaulted variables (you need to create this file first!)
  vars_files:
    - ../vars/ssh_vault.yml  # Adjust path to your vault file

  vars:
    # Enable deployment from vault
    ssh_deploy_from_vault: true

    # Reference the vaulted variables
    ssh_private_key_content: "{{ ssh_private_key }}"
    ssh_public_key_content: "{{ ssh_public_key }}"

    # Optional: Specify key type if not using default
    ssh_key_type: "ed25519"  # or "rsa"

  roles:
    - ssh

  # Before running:
  # 1. Create vars/ssh_vault.yml with your keys (see vars/example_vault.yml)
  # 2. Encrypt it: ansible-vault encrypt vars/ssh_vault.yml
  #
  # Run with:
  # ansible-playbook 03-deploy-from-vault.yml --ask-vault-pass

  # This will:
  # - Deploy your private key to ~/.ssh/id_ed25519
  # - Deploy your public key to ~/.ssh/id_ed25519.pub
  # - Set correct permissions (0600 for private, 0644 for public)
