---
# Role: 04_shell_config
# Purpose: Configure shell plugins and tools (zsh, oh-my-zsh, plugins)

- name: Display shell configuration status
  ansible.builtin.debug:
    msg: "Configuring zsh and oh-my-zsh"

- name: Ensure zsh is installed
  become: true
  community.general.pacman:
    name: zsh
    state: present
  when: sudo_configured | default(false)

- name: Check if oh-my-zsh is already installed
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.oh-my-zsh"
  register: ohmyzsh_dir

- name: Link oh-my-zsh from AUR installation
  ansible.builtin.file:
    src: /usr/share/oh-my-zsh
    dest: "{{ ansible_env.HOME }}/.oh-my-zsh"
    state: link
    force: false
  when: not ohmyzsh_dir.stat.exists

- name: Install zsh-autosuggestions plugin
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-autosuggestions
    dest: "{{ ansible_env.HOME }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
    version: master
    depth: 1
    update: false

- name: Install zsh-syntax-highlighting plugin
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-syntax-highlighting
    dest: "{{ ansible_env.HOME }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting"
    version: master
    depth: 1
    update: false

- name: Check current shell
  ansible.builtin.command: echo $SHELL
  register: current_shell
  changed_when: false

- name: Set zsh as default shell
  become: true
  ansible.builtin.user:
    name: "{{ ansible_user_id }}"
    shell: /usr/bin/zsh
  when:
    - sudo_configured | default(false)
    - current_shell.stdout != '/usr/bin/zsh'

- name: Display shell configuration complete
  ansible.builtin.debug:
    msg: "Shell configuration complete. Current shell: {{ current_shell.stdout }}"
