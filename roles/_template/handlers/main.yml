---
# Template Role - Handlers
# Handlers are triggered by 'notify' in tasks

- name: Restart tool service
  become: true
  ansible.builtin.systemd:
    name: tool
    state: restarted
  listen: restart tool

- name: Reload tool configuration
  ansible.builtin.command:
    cmd: tool reload
  listen: reload tool
  changed_when: false
