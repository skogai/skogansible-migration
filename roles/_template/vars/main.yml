---
# <role> Role - Variables
# These override defaults/main.yml for specific use cases
# Typically used for environment-specific values

# Example: Override package name for specific distribution
# <role>_package_name: "<alternative_package>"

# Example: Custom configuration path
# <role>_config_file: "/etc/<role>/config.conf"

# Example: Complex data structures
# <role>_items:
#   - name: "<environment_1>"
#     enabled: true
#     value: 100
#   - name: "<environment_2>"
#     enabled: false
#     value: 50
