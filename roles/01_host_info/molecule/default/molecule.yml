---
# Molecule configuration for 01_host_info role
#
# IMPORTANT: This configuration requires the following collections to be installed:
#   - community.docker (>=3.10.2)
#   - ansible.posix (>=1.4.0)
#
# Install them with:
#   ansible-galaxy collection install community.docker ansible.posix
#
# Or use the requirements.yml file in this directory:
#   ansible-galaxy collection install -r requirements.yml
#
dependency:
  name: galaxy
  enabled: false
driver:
  name: docker
platforms:
  - name: arch-test
    image: archlinux:latest
    # Run systemd in container for services that might need it
    command: /usr/sbin/init
    privileged: true
    pre_build_image: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
provisioner:
  name: ansible
  config_options:
    defaults:
      callbacks_enabled: profile_tasks
      interpreter_python: auto_silent
  inventory:
    host_vars:
      arch-test:
        # Mock become password file for testing
        ansible_become_password_file: ""
verifier:
  name: ansible
