---
- name: Save ansible facts to file
  ansible.builtin.copy:
    content: "{{ ansible_facts | to_nice_yaml }}"
    dest: "{{ playbook_dir }}/../ansible_facts.yml"

- name: Check distribution is supported
  ansible.builtin.assert:
    that: ansible_distribution == "Archlinux"
    fail_msg: "Distribution '{{ ansible_distribution }}' is not supported."
    success_msg: "I run Arch, btw"

- name: Display current user
  ansible.builtin.debug:
    msg: "Running as user: {{ ansible_user_id }}"

- name: Check become password file exists
  ansible.builtin.stat:
    path: "{{ lookup('env', 'ANSIBLE_BECOME_PASSWORD_FILE') }}"
  register: become_pass_file
  when: lookup('env', 'ANSIBLE_BECOME_PASSWORD_FILE') != ''

- name: Set sudo configuration status
  ansible.builtin.set_fact:
    sudo_configured: "{{ become_pass_file.stat.exists | default(false) }}"

- name: Display sudo configuration status
  ansible.builtin.debug:
    msg: "Sudo configuration: {{ 'configured' if sudo_configured else 'NOT configured - will skip privileged tasks' }}"

- name: End play if sudo not configured
  ansible.builtin.meta: end_play
  when: not sudo_configured
