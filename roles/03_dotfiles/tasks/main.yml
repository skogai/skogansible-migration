---
# Role: 03_dotfiles
# Purpose: Clone/update dotfiles repository and setup RCM symlinks

- name: Clone dotfiles repository
  ansible.builtin.git:
    repo: 'git@github.com:SkogAI/.dotfiles.git'
    dest: "{{ ansible_env.HOME }}/.dotfiles"
    version: develop
    accept_hostkey: yes
    update: yes

- name: TODO - Run rcup to symlink dotfiles
  ansible.builtin.debug:
    msg: "TODO: Execute rcup to create dotfile symlinks"

- name: TODO - Verify dotfile symlinks
  ansible.builtin.debug:
    msg: "TODO: Verify critical dotfiles are properly symlinked (zshrc, gitconfig, etc.)"
