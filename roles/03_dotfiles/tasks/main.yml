---
# Role: 03_dotfiles
# Purpose: Clone/update dotfiles repository and setup RCM symlinks

- name: Clone dotfiles repository
  ansible.builtin.git:
    repo: 'git@github.com:SkogAI/.dotfiles.git'
    dest: "{{ ansible_env.HOME }}/.dotfiles"
    version: develop
    accept_hostkey: yes
    update: yes
  ignore_errors: true

- name: Copy rcrc configuration to home directory
  ansible.builtin.copy:
    src: "{{ ansible_env.HOME }}/.dotfiles/rcrc"
    dest: "{{ ansible_env.HOME }}/.rcrc"
    remote_src: yes
    mode: '0644'

- name: Run rcup to symlink dotfiles
  ansible.builtin.command:
    cmd: rcup
  register: rcup_result
  changed_when: rcup_result.rc == 0

- name: Display rcup results
  ansible.builtin.debug:
    var: rcup_result.stdout_lines
  when: rcup_result.stdout_lines is defined and rcup_result.stdout_lines | length > 0
