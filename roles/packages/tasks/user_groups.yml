---
# User and group management

- name: Ensure skogai group exists
  become: true
  ansible.builtin.group:
    name: skogai
    state: present

- name: Ensure wheel group exists
  become: true
  ansible.builtin.group:
    name: wheel
    state: present

- name: Grant wheel group sudo access
  become: true
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/10-wheel
    line: '%wheel ALL=(ALL:ALL) ALL'
    create: true
    mode: '0440'
    validate: 'visudo -cf %s'

- name: Add users to groups from vars/user.yml
  become: true
  ansible.builtin.user:
    name: "{{ item.name }}"
    groups: "{{ item.groups_base }}"
    append: true
  loop: "{{ users }}"
