---
# User and group management

- name: Ensure skogai group exists
  become: true
  ansible.builtin.group:
    name: skogai
    state: present

- name: Ensure wheel group exists
  become: true
  ansible.builtin.group:
    name: wheel
    state: present

- name: Apply group membership from vars/user.yml to system users
  become: true
  ansible.builtin.user:
    name: "{{ item.name }}"
    groups: "{{ item.groups_base }}"
    append: false
  loop: "{{ users }}"
