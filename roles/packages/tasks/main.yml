---
# Setup AUR user and helper first
- name: Setup AUR builder user
  ansible.builtin.include_tasks: aur_user.yml
  tags: [aur, aur_user]

- name: Install yay AUR helper
  ansible.builtin.include_tasks: aur_helper.yml
  tags: [aur, yay]

# Then handle regular package management
- name: Update pacman package database
  become: true
  community.general.pacman:
    update_cache: true

- name: Configure pacman parallel downloads
  become: true
  ansible.builtin.lineinfile:
    path: /etc/pacman.conf
    regexp: '^#?ParallelDownloads\s*='
    line: 'ParallelDownloads = {{ pacman_parallel_downloads }}'
    state: present
  tags: [packages, pacman_config]

- name: Upgrade all packages
  become: true
  community.general.pacman:
    upgrade: true

- name: Install packages from list
  become: true
  community.general.pacman:
    name: "{{ packages }}"
    state: present

# Finally install AUR packages (requires yay to be installed)
- name: Install AUR packages
  ansible.builtin.include_tasks: aur_packages.yml
  tags: [aur, aur_packages]
