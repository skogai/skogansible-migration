---
- name: "Packages | Setup AUR builder user"
  ansible.builtin.include_tasks: aur_user.yml
  tags: [packages, aur, aur-user]

- name: "Packages | Install AUR helper"
  ansible.builtin.include_tasks: aur_helper.yml
  tags: [packages, aur, aur-helper]

- name: "Packages | Update pacman package database"
  become: true
  community.general.pacman:
    update_cache: true
  tags: [packages]

- name: "Packages | Configure pacman parallel downloads"
  become: true
  ansible.builtin.lineinfile:
    path: /etc/pacman.conf
    regexp: '^#?ParallelDownloads\s*='
    line: "ParallelDownloads = {{ pacman_parallel_downloads }}"
    state: present
  tags: [packages, pacman-config]

- name: "Packages | Upgrade all packages"
  become: true
  community.general.pacman:
    upgrade: true
  tags: [packages]

- name: "Packages | Install packages from list"
  become: true
  community.general.pacman:
    name: "{{ packages }}"
    state: present
  tags: [packages, packages-install]

- name: "Packages | Install AUR packages"
  ansible.builtin.include_tasks: aur_packages.yml
  tags: [packages, aur, aur-packages]
