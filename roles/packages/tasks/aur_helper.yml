---
- name: "Packages | Ensure base-devel and git are installed"
  become: true
  community.general.pacman:
    name:
      - base-devel
      - git
    state: present
  tags: [packages, aur, aur-helper]

- name: "Packages | Remove paru-bin if present"
  become: true
  community.general.pacman:
    name: paru-bin
    state: absent
  tags: [packages, aur, aur-helper]

- name: "Packages | Ensure rustup is installed"
  become: true
  community.general.pacman:
    name: rustup
    state: present
  tags: [packages, aur, aur-helper]

- name: "Packages | Ensure stable rust toolchain for aur_builder"
  become: true
  become_user: aur_builder
  ansible.builtin.command: rustup default stable
  changed_when: false
  tags: [packages, aur, aur-helper]

- name: "Packages | Install paru AUR helper via kewlfft.aur"
  become: true
  become_user: aur_builder
  kewlfft.aur.aur:
    name: paru
    use: makepkg
    state: present
  environment:
    PATH: "/home/aur_builder/.cargo/bin:{{ ansible_env.PATH }}"
  tags: [packages, aur, aur-helper]
