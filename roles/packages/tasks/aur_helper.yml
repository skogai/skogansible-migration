---
- name: "Packages | Ensure base-devel and git are installed"
  become: true
  community.general.pacman:
    name:
      - base-devel
      - git
    state: present
  tags: [packages, aur, aur-helper]

- name: "Packages | Check if paru is already installed"
  ansible.builtin.stat:
    path: /usr/bin/paru
  register: paru_stat
  tags: [packages, aur, aur-helper]

- name: "Packages | Install paru-bin AUR helper"
  become: true
  become_user: aur_builder
  kewlfft.aur.aur:
    name: paru-bin
    use: makepkg
    state: present
  when: not paru_stat.stat.exists
  tags: [packages, aur, aur-helper]
