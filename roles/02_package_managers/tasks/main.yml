---
- lineinfile:
    path: /etc/sudoers.d/aur_builder-allow-to-sudo-pacman
    state: present
    line: "aur_builder ALL=(ALL) NOPASSWD: /usr/bin/pacman"
    validate: /usr/sbin/visudo -cf %s
    create: yes
    mode: "0440"
    validate: "visudo -cf %s"
- name: Ensure yay is installed
  become: true
  become_user: aur_builder
  kewlfft.aur.aur:
    name: yay
    use: auto
    state: present

