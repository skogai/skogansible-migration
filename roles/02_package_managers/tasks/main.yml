---
- name: Verify pacman is available
  ansible.builtin.command: pacman --version
  changed_when: false
  register: pacman_version

- name: Display pacman version
  ansible.builtin.debug:
    msg: "Pacman version: {{ pacman_version.stdout_lines[0] }}"

- name: Ensure base-devel is installed
  community.general.pacman:
    name: base-devel
    state: present

- name: Ensure git is installed
  community.general.pacman:
    name: git
    state: present

- name: Check if yay is installed
  ansible.builtin.command: which yay
  register: yay_check
  changed_when: false
  failed_when: false

- name: Install yay from AUR
  when: yay_check.rc != 0
  block:
    - name: Clone yay repository
      ansible.builtin.git:
        repo: https://aur.archlinux.org/yay.git
        dest: /tmp/yay
        version: master

    - name: Build and install yay
      ansible.builtin.command:
        cmd: makepkg -si --noconfirm
        chdir: /tmp/yay

    - name: Clean up yay build directory
      ansible.builtin.file:
        path: /tmp/yay
        state: absent

- name: Verify yay is available
  ansible.builtin.command: yay --version
  changed_when: false
  register: yay_version

- name: Display yay version
  ansible.builtin.debug:
    msg: "Yay version: {{ yay_version.stdout_lines[0] }}"
