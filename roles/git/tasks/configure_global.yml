---
# Git Role - Configure Global Git Settings

- name: "Git | Deploy .gitconfig from template"
  when: git_deploy_config and git_config_template is defined
  ansible.builtin.template:
    src: "{{ git_config_template }}"
    dest: "{{ git_config_file }}"
    mode: "0644"
    owner: "{{ ansible_facts['user_id'] }}"
    group: "{{ ansible_facts['user_id'] }}"
    backup: true
  tags:
    - git
    - git-config

- name: "Git | Configure user name"
  when: git_user_name | length > 0
  community.general.git_config:
    name: user.name
    value: "{{ git_user_name }}"
    scope: global
  tags:
    - git
    - git-config

- name: "Git | Configure user email"
  when: git_user_email | length > 0
  community.general.git_config:
    name: user.email
    value: "{{ git_user_email }}"
    scope: global
  tags:
    - git
    - git-config

- name: "Git | Configure default editor"
  when: git_editor | length > 0
  community.general.git_config:
    name: core.editor
    value: "{{ git_editor }}"
    scope: global
  tags:
    - git
    - git-config

- name: "Git | Configure default branch name"
  when: git_default_branch | length > 0
  community.general.git_config:
    name: init.defaultBranch
    value: "{{ git_default_branch }}"
    scope: global
  tags:
    - git
    - git-config

- name: "Git | Configure core settings"
  community.general.git_config:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    scope: global
  loop:
    - {name: "core.autocrlf", value: "{{ git_core_autocrlf }}"}
    - {name: "core.fileMode", value: "{{ git_core_filemode }}"}
    - {name: "core.ignoreCase", value: "{{ git_core_ignorecase }}"}
  tags:
    - git
    - git-config

- name: "Git | Configure color UI"
  community.general.git_config:
    name: color.ui
    value: "{{ git_color_ui }}"
    scope: global
  tags:
    - git
    - git-config

- name: "Git | Configure push settings"
  community.general.git_config:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    scope: global
  loop:
    - {name: "push.default", value: "{{ git_push_default }}"}
    - {name: "push.followTags", value: "{{ git_push_followTags }}"}
    - {name: "push.autoSetupRemote", value: "{{ git_push_autoSetupRemote }}"}
  tags:
    - git
    - git-config

- name: "Git | Configure pull settings"
  community.general.git_config:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    scope: global
  loop:
    - {name: "pull.rebase", value: "{{ git_pull_rebase }}"}
    - {name: "pull.ff", value: "{{ git_pull_ff }}"}
  tags:
    - git
    - git-config

- name: "Git | Configure merge settings"
  community.general.git_config:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    scope: global
  loop:
    - {name: "merge.ff", value: "{{ git_merge_ff }}"}
    - {name: "merge.conflictStyle", value: "{{ git_merge_conflictstyle }}"}
  tags:
    - git
    - git-config

- name: "Git | Configure diff settings"
  community.general.git_config:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    scope: global
  loop:
    - {name: "diff.algorithm", value: "{{ git_diff_algorithm }}"}
    - {name: "diff.colorMoved", value: "{{ git_diff_colorMoved }}"}
  tags:
    - git
    - git-config

- name: "Git | Configure rebase settings"
  community.general.git_config:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    scope: global
  loop:
    - {name: "rebase.autoSquash", value: "{{ git_rebase_autosquash }}"}
    - {name: "rebase.autoStash", value: "{{ git_rebase_autostash }}"}
  tags:
    - git
    - git-config

- name: "Git | Configure fetch settings"
  community.general.git_config:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    scope: global
  loop:
    - {name: "fetch.prune", value: "{{ git_fetch_prune }}"}
    - {name: "fetch.pruneTags", value: "{{ git_fetch_pruneTags }}"}
  tags:
    - git
    - git-config

- name: "Git | Configure rerere settings"
  when: git_rerere_enabled
  community.general.git_config:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    scope: global
  loop:
    - {name: "rerere.enabled", value: "{{ git_rerere_enabled }}"}
    - {name: "rerere.autoUpdate", value: "{{ git_rerere_autoupdate }}"}
  tags:
    - git
    - git-config

- name: "Git | Configure submodule recursion"
  when: git_submodule_recurse
  community.general.git_config:
    name: submodule.recurse
    value: "{{ git_submodule_recurse }}"
    scope: global
  tags:
    - git
    - git-config

- name: "Git | Configure pack optimization"
  community.general.git_config:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    scope: global
  loop:
    - {name: "pack.threads", value: "{{ git_pack_threads }}"}
    - {name: "pack.windowMemory", value: "{{ git_pack_windowMemory }}"}
  tags:
    - git
    - git-config
