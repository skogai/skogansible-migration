---
# Git Role - Configure Git Credential Helper

- name: "Git | Configure credential helper"
  community.general.git_config:
    name: credential.helper
    value: "{{ git_credential_helper }}"
    scope: global
  tags:
    - git
    - git-credentials

- name: "Git | Configure credential cache timeout"
  when: git_credential_helper == "cache"
  community.general.git_config:
    name: credential.helper
    value: "cache --timeout={{ git_credential_cache_timeout }}"
    scope: global
  tags:
    - git
    - git-credentials

- name: "Git | Configure credential store file"
  when: git_credential_helper == "store"
  community.general.git_config:
    name: credential.helper
    value: "store --file={{ git_credential_store_file }}"
    scope: global
  tags:
    - git
    - git-credentials

- name: "Git | Warning about credential store security"
  when: git_credential_helper == "store"
  ansible.builtin.debug:
    msg: "WARNING: Git credential store saves passwords in plain text at {{ git_credential_store_file }}"
  tags:
    - git
    - git-credentials
