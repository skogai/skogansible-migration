---
# Cloudflared Role - Main Tasks
# Manages Cloudflare Tunnel service with proper credential deployment

# ==============================================================================
# Ensure Cloudflared Configuration Directory
# ==============================================================================

- name: "Cloudflared | Ensure user cloudflared directory exists"
  ansible.builtin.file:
    path: "{{ cloudflared_user_dir }}"
    state: directory
    mode: "{{ cloudflared_user_dir_mode }}"
    owner: "{{ ansible_facts['user_id'] }}"
    group: "{{ ansible_facts['user_id'] }}"
  tags: [cloudflared, cloudflared-config]

# ==============================================================================
# Origin Certificate Deployment (from Vault)
# ==============================================================================

- name: "Cloudflared | Deploy origin certificate from vault"
  when: cloudflared_deploy_cert | bool
  tags: [cloudflared, cloudflared-cert, cloudflared-vault]
  block:
    - name: "Cloudflared | Validate cert is defined"
      ansible.builtin.assert:
        that:
          - cloudflared_origin_cert is defined
          - cloudflared_origin_cert | length > 0
        fail_msg: >-
          cloudflared_origin_cert is not defined or empty.
          Please ensure vars/cloudflared_vault.yml is loaded and
          contains cloudflared_origin_cert_content.

    - name: "Cloudflared | Deploy origin certificate (cert.pem)"
      ansible.builtin.copy:
        content: "{{ cloudflared_origin_cert }}"
        dest: "{{ cloudflared_cert_file }}"
        mode: "{{ cloudflared_cert_mode }}"
        owner: "{{ ansible_facts['user_id'] }}"
        group: "{{ ansible_facts['user_id'] }}"
      no_log: true  # Don't log certificate content
      register: cloudflared_cert_deployed

# ==============================================================================
# Generate Tunnel Credentials
# ==============================================================================

- name: "Cloudflared | Generate tunnel credentials"
  when: cloudflared_generate_creds | bool
  tags: [cloudflared, cloudflared-creds]
  block:
    - name: "Cloudflared | Check if tunnel credentials exist"
      ansible.builtin.stat:
        path: "{{ cloudflared_creds_file }}"
      register: cloudflared_creds_stat

    - name: "Cloudflared | Generate tunnel credentials using cloudflared command"
      when: not cloudflared_creds_stat.stat.exists or cloudflared_force_regenerate_creds | bool
      ansible.builtin.command:
        cmd: >-
          cloudflared tunnel token
          --cred-file {{ cloudflared_creds_file }}
          {{ cloudflared_tunnel_name }}
        creates: "{{ cloudflared_creds_file }}"
      environment:
        # Ensure cloudflared uses the correct cert.pem
        TUNNEL_ORIGIN_CERT: "{{ cloudflared_cert_file }}"
      register: cloudflared_creds_generated

    - name: "Cloudflared | Set permissions on tunnel credentials"
      ansible.builtin.file:
        path: "{{ cloudflared_creds_file }}"
        mode: "{{ cloudflared_creds_mode }}"
        owner: "{{ ansible_facts['user_id'] }}"
        group: "{{ ansible_facts['user_id'] }}"

# ==============================================================================
# Systemd Service Deployment
# ==============================================================================

- name: "Cloudflared | Deploy systemd service"
  when: cloudflared_deploy_service | bool
  become: true
  tags: [cloudflared, cloudflared-service]
  block:
    - name: "Cloudflared | Deploy cloudflared systemd service"
      ansible.builtin.template:
        src: "{{ cloudflared_service_template }}"
        dest: "/etc/systemd/system/cloudflared.service"
        mode: "0644"
        owner: root
        group: root
      notify:
        - Reload systemd
        - Restart cloudflared

    - name: "Cloudflared | Enable and start cloudflared service"
      when: cloudflared_enable_service | bool
      ansible.builtin.systemd:
        name: cloudflared
        enabled: true
        state: >-
          {{
            'restarted'
            if (cloudflared_cert_deployed is defined and
                cloudflared_cert_deployed.changed) or
               (cloudflared_creds_generated is defined and
                cloudflared_creds_generated.changed)
            else 'started'
          }}
        daemon_reload: true
