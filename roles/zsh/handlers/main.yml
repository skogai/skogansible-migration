---
# zsh Role - Handlers
# Handlers are triggered by 'notify' in tasks

# zsh is not a daemon, so no restart handlers needed
# Config changes take effect on next shell session

# Example: Notify config updated
# - name: Notify zsh config updated
#   ansible.builtin.debug:
#     msg: "zsh configuration updated. Start new shell session to apply."
#   listen: config updated
