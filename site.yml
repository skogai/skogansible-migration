---
# Main playbook - runs ALL roles for complete system configuration
# Variables are auto-loaded from group_vars/all/
- name: Configure Arch Linux system (complete)
  hosts: all
  connection: local

  roles:
    - role: users
      tags: [users, security]

    - role: packages
      tags: [packages, install]

    - role: ssh
      tags: [ssh, config]

    - role: git
      tags: [git, vcs]

    - role: chezmoi
      tags: [chezmoi, dotfiles]

    - role: zsh
      tags: [zsh, shell]
