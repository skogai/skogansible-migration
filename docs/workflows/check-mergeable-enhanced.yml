name: Check PR Mergeability (Enhanced)

# This is an enhanced version of check-mergeable.yml that calls @claude
# to automatically resolve conflicts and fast-forward branches

on:
  push:
    branches:
      - master
      - main

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  check-mergeable:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run check-mergeable script
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/check-mergeable
          ./scripts/check-mergeable

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mergeable-report
          path: report.md
          retention-days: 30
