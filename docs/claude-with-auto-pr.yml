# Example workflow showing how to add auto-PR creation to claude.yml
#
# This is a REFERENCE implementation showing how to extend the workflow
# to automatically create PRs after Claude finishes tasks.
#
# NOTE: The preferred approach is to integrate this into the centralized
# reusable workflow at SkogAI/.github/.github/workflows/claude-workflow-manager.yml
#
# This file is for documentation purposes only.

name: Claude Workflow Assistant (with Auto-PR)

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  call-claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))

    uses: SkogAI/.github/.github/workflows/claude-workflow-manager.yml@master
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

  # Post-processing step to auto-create PR if Claude created a branch
  auto-create-pr:
    needs: call-claude
    runs-on: ubuntu-latest
    if: always()  # Run even if Claude job fails/is cancelled

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history to check branches

      - name: Determine branch name
        id: branch
        run: |
          # Extract branch name from issue/PR context
          if [[ "${{ github.event_name }}" == "issues" ]]; then
            ISSUE_NUM="${{ github.event.issue.number }}"
            TIMESTAMP=$(date +%Y%m%d-%H%M)
            BRANCH="claude/issue-${ISSUE_NUM}-${TIMESTAMP}"
          else
            # For PR/comment events, need to check what Claude created
            # This is a simplified example
            BRANCH=$(git branch -r | grep "origin/claude/" | head -1 | sed 's|origin/||')
          fi
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Auto-create PR if branch exists
        if: steps.branch.outputs.branch != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ steps.branch.outputs.branch }}"

          # Check if branch exists
          if ! git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            echo "Branch $BRANCH does not exist, skipping PR creation"
            exit 0
          fi

          # Checkout the branch
          git checkout "$BRANCH"

          # Run the auto-PR script
          ./scripts/auto-create-pr

# Alternative approach: Add auto-PR directly to Claude's instructions
# This would be done by modifying the prompt in the centralized workflow.
# See docs/auto-pr-implementation.md for details.
