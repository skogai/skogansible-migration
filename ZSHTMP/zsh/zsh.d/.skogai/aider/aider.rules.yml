coding pipeline:
  steps:
    - name: Create Documentation
      description: Update a `.skogai/docs/todo.md` file with an outline of the intended solution for the task.
      tasks:
        - Write a clear description of the problem.
        - List the requirements and constraints.
        - Break down the solution into manageable steps.

    - name: Specify Functions
      description: Define the functions required for the solution with their inputs, outputs, and flow.
      tasks:
        - List all necessary functions.
        - Document input parameters and data types for each function.
        - Specify expected outputs and return types.
        - Describe the general flow of logic for each function.

    - name: Write Tests
      description: Create test cases to cover all intended functionalities before implementation.
      tasks:
        - Write test cases for each function based on its specifications.
        - Ensure tests cover edge cases and potential failure scenarios.
        - Use a testing framework (e.g., pytest for Python).
        - Document the expected behavior for each test case.

    - name: Implement Code
      description: Implement the solution based on the documentation and pass all tests.
      tasks:
        - Implement each function as specified in the documentation.
        - Use modular and clean coding practices.
        - Run all tests to verify functionality.
        - Debug and refactor until all tests pass successfully.

    - name: Finalize and Review
      description: Review the implementation and documentation for completeness.
      tasks:
        - Review and update `todo.md` to reflect the completed implementation.
        - Ensure all tests are included and pass.
        - Refactor code if necessary for readability and efficiency.
        - Commit the final implementation and documentation to version control.
