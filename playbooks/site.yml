---
# Main playbook - runs ALL roles for complete system configuration
# Uses composition layer for profile-based role selection
- name: Configure Arch Linux system (complete)
  hosts: all
  connection: local

  vars_files:
    - ../vars/main.yml          # Shared variables
    - ../vars/packages.yml      # Package lists
    - ../vars/ssh.yml           # SSH configuration
    - ../vars/ssh_vault.yml     # Encrypted SSH keys
    - ../vars/user.yml          # User variables
    - ../vars/git.yml           # Git configuration
    - ../vars/chezmoi.yml       # Chezmoi configuration
    - ../vars/zsh.yml           # Zsh configuration
    - ../vars/cloudflared.yml   # Cloudflared configuration
    - ../vars/cloudflared_vault.yml  # Cloudflared tunnel token
    - ../vars/filesystems.yml   # Filesystem mounts

  roles:
    # ========================================================================
    # BASE SYSTEM (all profiles)
    # ========================================================================

    - role: packages
      tags: [packages, install, base]

    - role: ssh
      tags: [ssh, config, base]

    # ========================================================================
    # VERSION CONTROL & DOTFILES (all profiles)
    # ========================================================================

    - role: git
      tags: [git, vcs]

    - role: chezmoi
      tags: [chezmoi, dotfiles]
      # Note: chezmoi depends on git (declared in meta/main.yml)

    # ========================================================================
    # SHELL CONFIGURATION (all profiles)
    # ========================================================================

    - role: zsh
      tags: [zsh, shell]

    # ========================================================================
    # SERVICES (profile-specific)
    # ========================================================================

    - role: cloudflared
      tags: [cloudflared, tunnel, services]
      when:
        - machine_type in ['workstation', 'server']
        - cloudflared_enabled | default(true)

    - role: filesystems
      tags: [filesystems, mounts]
      when:
        - machine_type in ['workstation', 'server']
        - filesystems_mounts is defined
        - filesystems_mounts | length > 0
