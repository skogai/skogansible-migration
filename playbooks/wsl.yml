---
# WSL profile - Windows Subsystem for Linux environment
- name: Configure WSL environment
  hosts: all
  connection: local

  vars_files:
    - ../vars/main.yml
    - ../vars/packages.yml
    - ../vars/ssh.yml
    - ../vars/ssh_vault.yml
    - ../vars/user.yml
    - ../vars/git.yml
    - ../vars/chezmoi.yml
    - ../vars/zsh.yml

  vars:
    # Override machine type for WSL profile
    machine_type: wsl
    chezmoi_machine_type: wsl
    chezmoi_headless: true
    chezmoi_gui: false
    chezmoi_wm: none

  roles:
    # Base system (all profiles)
    - role: packages
      tags: [packages, install, base, wsl]
      vars:
        # WSL-specific package overrides
        packages_gui: false
        packages_cli_only: true

    - role: ssh
      tags: [ssh, config, base, wsl]

    # Version control (critical for Windows integration)
    - role: git
      tags: [git, vcs, wsl]

    # Dotfiles with WSL-specific configs
    - role: chezmoi
      tags: [chezmoi, dotfiles, wsl]

    # Shell configuration
    - role: zsh
      tags: [zsh, shell, wsl]
