---
# Workstation profile - full desktop/development environment
- name: Configure Arch Linux workstation
  hosts: all
  connection: local

  vars_files:
    - ../vars/main.yml
    - ../vars/packages.yml
    - ../vars/ssh.yml
    - ../vars/ssh_vault.yml
    - ../vars/user.yml
    - ../vars/git.yml
    - ../vars/chezmoi.yml
    - ../vars/zsh.yml
    - ../vars/cloudflared.yml
    - ../vars/cloudflared_vault.yml
    - ../vars/filesystems.yml

  vars:
    # Ensure machine type is set for workstation profile
    machine_type: workstation
    chezmoi_machine_type: workstation

  roles:
    # ========================================================================
    # BASE SYSTEM (all profiles)
    # ========================================================================

    - role: packages
      tags: [packages, install, base, workstation]

    - role: ssh
      tags: [ssh, config, base, workstation]

    # ========================================================================
    # VERSION CONTROL & DOTFILES (all profiles)
    # ========================================================================

    - role: git
      tags: [git, vcs, workstation]

    - role: chezmoi
      tags: [chezmoi, dotfiles, workstation]

    # ========================================================================
    # SHELL CONFIGURATION (all profiles)
    # ========================================================================

    - role: zsh
      tags: [zsh, shell, workstation]

    # ========================================================================
    # SERVICES (workstation-specific)
    # ========================================================================

    - role: cloudflared
      tags: [cloudflared, tunnel, services, workstation]

    - role: filesystems
      tags: [filesystems, mounts, workstation]
      when:
        - filesystems_mounts is defined
        - filesystems_mounts | length > 0
