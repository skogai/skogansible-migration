---
# Bootstrap playbook - minimal initial setup
# Run this on a fresh Arch installation to get basic tooling
# Variables are auto-loaded from group_vars/all/
- name: Bootstrap Arch Linux system
  hosts: all
  connection: local

  roles:
    - role: packages
      tags: [packages, install]
      vars:
        # Bootstrap-specific overrides (minimal packages only)
        packages_upgrade_system: false  # Don't upgrade on bootstrap
