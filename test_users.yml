---
# Test playbook for users role - no vault files required
# Variables are auto-loaded from group_vars/all/
- name: Test users role
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    # Override defaults for testing
    users_ensure_users: true
    users_ensure_groups: true

  roles:
    - role: users
      tags: [users, security]
