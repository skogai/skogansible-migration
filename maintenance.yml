---
# Maintenance playbook - updates and cleanup only
# Use for regular system maintenance without changing configuration
# Variables are auto-loaded from group_vars/all/
- name: Maintain Arch Linux system
  hosts: all
  connection: local

  roles:
    - role: packages
      tags: [packages, update]
      vars:
        # Maintenance-specific overrides
        packages_update_cache: true
        packages_upgrade_system: true
