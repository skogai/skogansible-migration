---
# Filesystem mounts configuration
# Manages data drive mounts for the system

# WARNING: The UUIDs below are specific to skogix's machine.
# These values MUST be updated for your system before running this role.
#
# To find your filesystem UUIDs, run:
#   sudo blkid                    # List all block devices with UUIDs
#   sudo blkid /dev/sdX1          # Check specific device
#   lsblk -f                      # Alternative with filesystem info
#
# List of filesystem mounts to manage
data_mounts:
  - path: /mnt/sda1/
    uuid: 93f3c5d5-d775-4364-abc2-09161102aa04
    fstype: ext4
    opts: defaults
    state: mounted
    dump: 0
    passno: 2

  - path: /mnt/sda2/
    uuid: 4cb7e060-09f1-455d-8a4b-dea8286c6c0a
    fstype: ext4
    opts: defaults
    state: mounted
    dump: 0
    passno: 2
