---
# Cloudflared Role Configuration

# ==============================================================================
# Tunnel Identification
# ==============================================================================

# Tunnel name (human-readable name used in cloudflared commands)
cloudflared_tunnel_name: "skogai"

# Tunnel ID (UUID - used for credentials filename)
cloudflared_tunnel_id: "ae7fd63a-935f-42b2-b1d0-a53cca0f2798"

# ==============================================================================
# Certificate Deployment
# ==============================================================================

# Deploy origin certificate from vault
cloudflared_deploy_cert: true

# Map vault variable to role variable
cloudflared_origin_cert: "{{ cloudflared_origin_cert_content | default('') }}"

# ==============================================================================
# Credential Generation
# ==============================================================================

# Generate tunnel credentials using cloudflared command
cloudflared_generate_creds: true

# Force regeneration (set to true to regenerate credentials file)
cloudflared_force_regenerate_creds: false

# ==============================================================================
# Service Configuration
# ==============================================================================

# Deploy and enable systemd service
cloudflared_deploy_service: true
cloudflared_enable_service: true

# Service template to use
cloudflared_service_template: "cloudflared.service.j2"

# ==============================================================================
# Additional Configuration
# ==============================================================================

# Extra arguments to pass to cloudflared (optional)
# cloudflared_extra_args: "--metrics localhost:8080"
