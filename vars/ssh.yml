---
# SSH Role Configuration - Granular Approach
# Each SSH component managed separately for fine control

# ==============================================================================
# SSH Directory Deployment (Drop-and-Forget Files)
# ==============================================================================

# Deploy entire .ssh directory from files/ (encrypted files approach)
ssh_deploy_full_directory: true

# ==============================================================================
# SSH Key Deployment (Vault Variables)
# ==============================================================================

# Deploy SSH keys from vault variables (all types: ed25519, rsa, ecdsa)
ssh_deploy_from_vault: true

# Vault variables used:
#   - ssh_private_key_ed25519 / ssh_public_key_ed25519
#   - ssh_private_key_rsa / ssh_public_key_rsa
#   - ssh_private_key_ecdsa / ssh_public_key_ecdsa
# Each key type deploys only if variable is defined in vars/ssh_vault.yml

# ==============================================================================
# SSH Configuration File
# ==============================================================================

# Deploy custom SSH config from template
ssh_deploy_config: true
ssh_config_template: "ssh_config.j2"

# Custom hosts for SSH config
ssh_custom_hosts:
  - name: soft
    hostname: git.skogix.se
    identity_file: ~/.ssh/id_ed25519

  - name: aldervall
    hostname: soft-serve
    user: root
    port: 22
    identity_file: ~/.ssh/id_ed25519
    identities_only: yes

  - name: ssh.skogai.se
    hostname: ssh.skogai.se
    proxy_command: /usr/bin/cloudflared access ssh --hostname %h

# ==============================================================================
# Known Hosts Management
# ==============================================================================

# Manage known_hosts file
ssh_manage_known_hosts: true

# Known hosts to add
ssh_known_hosts:
  - skogai.se

# ==============================================================================
# Authorized Keys Management
# ==============================================================================

# Manage authorized_keys file (for incoming SSH access)
ssh_manage_authorized_keys: false

# List of public keys to add to authorized_keys
# ssh_authorized_keys:
#   - "ssh-ed25519 AAAAC3... user@laptop"
#   - "ssh-rsa AAAAB3... user@desktop"

# ==============================================================================
# SSH Key Generation
# ==============================================================================

# Generate new SSH key if it doesn't exist
ssh_generate_key: true

# Key comment (usually email)
# ssh_key_comment: "your.email@example.com"

# ==============================================================================
# Backup
# ==============================================================================

# Enable SSH backup functionality (creates ~/.ssh_backup/)
ssh_enable_backup: false
